gth="244.3657" x="383.46" y="493.6766">Selection policy can retain images with</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.2065" x="383.46" y="508.9872">&gt;= 1 positive mark (or stricter thresholds).</text></g><g class="entity" data-qualified-name="GMN8" data-source-line="27" id="ent0009"><path d="M382.48,710.7283 L382.48,727.0383 L347.98,731.0383 L382.48,735.0383 L382.48,751.3494 A0,0 0 0 0 382.48,751.3494 L657.6402,751.3494 A0,0 0 0 0 657.6402,751.3494 L657.6402,720.7283 L647.6402,710.7283 L382.48,710.7283 A0,0 0 0 0 382.48,710.7283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M647.6402,710.7283 L647.6402,720.7283 L657.6402,720.7283 L647.6402,710.7283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1602" x="388.48" y="728.2966">Superseded keeps historical traceability;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.876" x="388.48" y="743.6072">it does not imply invalid outcomes.</text></g><!--link *start* to Created--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="5" id="lnk4"><path d="M303.06,63.6783 C303.06,77.8883 303.06,99.5083 303.06,118.2283" fill="none" id="*start*-to-Created" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="303.06,124.2283,307.06,115.2283,303.06,119.2283,299.06,115.2283,303.06,124.2283" style="stroke:#181818;stroke-width:1;"/></g><!--link Created to Open--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="7" id="lnk6"><path d="M303.06,164.7383 C303.06,185.9583 303.06,213.9183 303.06,235.1783" fill="none" id="Created-to-Open" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="303.06,241.1783,307.06,232.1783,303.06,236.1783,299.