<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1576px" preserveAspectRatio="none" style="width:834px;height:1576px;background:#FFFFFF;" version="1.1" viewBox="0 0 834 1576" width="834px" zoomAndPan="magnify"><title>OTW/AfricaStage Collaborative Positive-Selection Workflow</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="432.0859" x="199.9424" y="33.5352">OTW/AfricaStage Collaborative Positive-Selection Workflow</text></g><ellipse cx="351.4922" cy="57.4883" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="250.8242" x="226.0801" y="87.4883"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="230.8242" x="236.0801" y="109.0898">User submits PhotographerDelivery link</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="204.668" x="236.0801" y="123.2227">(e.g., Google Photos shared album)</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="239.9375" x="231.5234" y="155.7539"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="219.9375" x="241.5234" y="177.3555">Server registers PhotographerDelivery</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="202.0977" x="250.4434" y="209.8867"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="182.0977" x="260.4434" y="231.4883">Server discovers source images</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="271.8887" x="215.5479" y="264.0195"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="251.8887" x="225.5479" y="285.6211">Server creates or refreshes source manifest</text><polygon fill="#F1F1F1" points="294.1396,318.1523,408.8447,318.1523,420.8447,330.1523,408.8447,342.1523,294.1396,342.1523,282.1396,330.1523,294.1396,318.1523" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="114.7051" x="294.1396" y="334.3096">Discovery successful?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="264.6567" y="327.832">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="420.8447" y="327.832">no</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="284.5625" x="69.8525" y="352.1523"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="264.5625" x="79.8525" y="373.7539">Server imports/copies images to ImageServer</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="265.0566" x="79.6055" y="406.2852"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="245.0566" x="89.6055" y="427.8867">Server records canonical ImageAsset URLs</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="192.791" x="89.6055" y="442.0195">on AfricaStage/OTW ImageServer</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="232.8711" x="374.415" y="352.1523"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="212.8711" x="384.415" y="373.7539">Mark PhotographerDelivery as Failed</text><ellipse cx="490.8506" cy="417.2852" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="490.8506" cy="417.2852" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="167.4863" x="267.749" y="474.5508"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="147.4863" x="277.749" y="496.1523">Server creates ReviewRun</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="300.2129" x="201.3857" y="528.6836"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="280.2129" x="211.3857" y="550.2852">ReviewRun state -&gt; Open / CollectingSelections</text><rect fill="#555555" height="6" rx="2.5" ry="2.5" style="stroke:#555555;stroke-width:1;" width="682.9844" x="11" y="582.8164"/><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="200.5918" x="23" y="608.8164"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="180.5918" x="33" y="630.418">Reviewer A marks liked images</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="126.2754" x="33" y="644.5508">(positive checkmarks)</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="196.1445" x="25.2236" y="677.082"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.1445" x="35.2236" y="698.6836">Server persists SelectionMarks</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="199.2148" x="251.5918" y="608.8164"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="179.2148" x="261.5918" y="630.418">Reviewer B marks liked images</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="126.2754" x="261.5918" y="644.5508">(positive checkmarks)</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="196.1445" x="253.127" y="677.082"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.1445" x="263.127" y="698.6836">Server persists SelectionMarks</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="201.1777" x="478.8066" y="608.8164"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="181.1777" x="488.8066" y="630.418">Reviewer N marks liked images</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="126.2754" x="488.8066" y="644.5508">(positive checkmarks)</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="196.1445" x="481.3232" y="677.082"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.1445" x="491.3232" y="698.6836">Server persists SelectionMarks</text><rect fill="#555555" height="6" rx="2.5" ry="2.5" style="stroke:#555555;stroke-width:1;" width="682.9844" x="11" y="731.2148"/><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="309.1602" x="196.9121" y="757.2148"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="289.1602" x="206.9121" y="778.8164">Server aggregates SelectionMarks per ImageAsset</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="262.3672" x="220.3086" y="811.3477"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="171.8965" x="230.3086" y="832.9492">Apply selection retention rule</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="242.3672" x="230.3086" y="847.082">(e.g., retain if marks &gt;= policy threshold)</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="176.5566" x="263.2139" y="879.6133"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="156.5566" x="273.2139" y="901.2148">Persist selected candidates</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="201.9395" x="250.5225" y="982.2236"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="181.9395" x="260.5225" y="1003.8252">Optional CurationDecision step</text><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="247.373" x="227.8057" y="1051.3564"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="227.373" x="237.8057" y="1072.958">Consolidate/prune selected candidates</text><polygon fill="#F1F1F1" points="291.7603,933.7461,411.2241,933.7461,423.2241,945.7461,411.2241,957.7461,291.7603,957.7461,279.7603,945.7461,291.7603,933.7461" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="355.4922" y="968.3809">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="119.4639" x="291.7603" y="949.9033">Selected set too large?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="423.2241" y="943.4258">no</text><polygon fill="#F1F1F1" points="351.4922,1105.4893,363.4922,1117.4893,351.4922,1129.4893,339.4922,1117.4893,351.4922,1105.4893" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="226.5313" x="238.2266" y="1197.9668"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="206.5313" x="248.2266" y="1219.5684">Create pruning/removal candidates</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="137.8535" x="248.2266" y="1233.7012">as explicit later process</text><polygon fill="#F1F1F1" points="273.6812,1149.4893,429.3032,1149.4893,441.3032,1161.4893,429.3032,1173.4893,273.6812,1173.4893,261.6812,1161.4893,273.6812,1149.4893" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="355.4922" y="1184.124">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="155.6221" x="273.6812" y="1165.6465">Storage-saving needed later?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="441.3032" y="1159.1689">no</text><polygon fill="#F1F1F1" points="351.4922,1266.2324,363.4922,1278.2324,351.4922,1290.2324,339.4922,1278.2324,351.4922,1266.2324" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="34.1328" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="335.8496" x="183.5674" y="1358.71"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="315.8496" x="193.5674" y="1380.3115">Start new ReviewRun from same PhotographerDelivery</text><polygon fill="#F1F1F1" points="246.5303,1310.2324,456.4541,1310.2324,468.4541,1322.2324,456.4541,1334.2324,246.5303,1334.2324,234.5303,1322.2324,246.5303,1310.2324" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="355.4922" y="1344.8672">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="209.9238" x="246.5303" y="1326.3896">Need another pass from same delivery?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="468.4541" y="1319.9121">no</text><polygon fill="#F1F1F1" points="351.4922,1412.8428,363.4922,1424.8428,351.4922,1436.8428,339.4922,1424.8428,351.4922,1412.8428" style="stroke:#181818;stroke-width:0.5;"/><path d="M382.4922,1446.8428 L382.4922,1501.4297 L362.4922,1505.4297 L382.4922,1509.4297 L382.4922,1564.0166 A0,0 0 0 0 382.4922,1564.0166 L822.9707,1564.0166 A0,0 0 0 0 822.9707,1564.0166 L822.9707,1456.8428 L812.9707,1446.8428 L382.4922,1446.8428 A0,0 0 0 0 382.4922,1446.8428" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M812.9707,1446.8428 L812.9707,1456.8428 L822.9707,1456.8428 L812.9707,1446.8428" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="136.5381" x="388.4922" y="1464.4111">Modeling constraints:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330.0337" x="388.4922" y="1479.7217">- No positive SelectionMark is neutral, not rejection.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.2021" x="388.4922" y="1495.0322">- Positive selection can be sufficient for retention,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="132.5581" x="396.7188" y="1510.3428">depending on policy.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="419.4785" x="388.4922" y="1525.6533">- Curation/pruning is explicit and later, not review-time rejection.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="301.1074" x="388.4922" y="1540.9639">